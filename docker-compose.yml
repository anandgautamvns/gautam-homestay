version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gautam-homestay
    ports:
      - '3000:3000'
    # Load MONGODB_URI, JWT_SECRET, etc. from .env.local at runtime
    env_file:
      - .env.local
    # Override only the values that differ from .env.local in production
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped


